{% extends "layout.html" %}

{% block content %}
<h1>Search Results</h1>
<div class="container">           
        <table class="table table-hover text-center">
          <thead>
            <tr>
              <th>ISBN</th>
              <th>Title</th>
              <th>Author</th>
              <th>Year</th>
              <th>Link</th>
            </tr>
          </thead>
          <tbody>
          {% for book in books %}
              <tr>
                  <td>{{book['isbn']}}</td>
                  <td>{{book['title']}}</td>
                  <td>{{book['author']}}</td>
                  <td>{{book['year']}}</td>
                  <td><a href="/book/{{book['isbn']}}" class="card-link">Go to book page</a></td>
              </tr>
           {% endfor %}
          </tbody>
        </table>
      </div>
{% endblock  %}
